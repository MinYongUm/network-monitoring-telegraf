# =============================================================================
# network-monitoring-telegraf / telegraf/telegraf.conf
#
# 목적: Telegraf 글로벌 설정 및 InfluxDB v2 출력 설정
#
# 구조:
#   - [agent]            : Telegraf 에이전트 동작 설정 (수집 주기, 버퍼 등)
#   - [outputs.influxdb_v2] : 수집된 메트릭을 InfluxDB v2 로 전송
#   - inputs.d/          : 수집 대상별 입력 플러그인은 별도 파일로 분리 관리
#                          (aci_rest.conf / snmp_cisco_ios.conf /
#                           snmp_nxos.conf / eve_ng.conf)
#
# 환경변수 참조:
#   docker-compose.yml 의 telegraf 서비스 environment 블록에서 주입
#   $INFLUXDB_URL / $INFLUXDB_TOKEN / $INFLUXDB_ORG / $INFLUXDB_BUCKET
# =============================================================================


# -----------------------------------------------------------------------------
# [global_tags]
#
# 모든 메트릭에 공통으로 붙는 태그
# InfluxDB 쿼리 및 Grafana 대시보드 필터링에 활용
# -----------------------------------------------------------------------------
[global_tags]
  # 환경 구분 태그 (Stage 2 운영 배포 시 "production" 으로 변경)
  env = "staging"

  # 프로젝트 구분 태그 (Grafana 에서 telegraf/zabbix 비교 시 사용)
  project = "network-monitoring-telegraf"


# -----------------------------------------------------------------------------
# [agent]
#
# Telegraf 에이전트 동작 방식 설정
# -----------------------------------------------------------------------------
[agent]
  # 기본 수집 주기 (inputs.d/ 의 각 플러그인에서 interval 을 개별 지정하지
  # 않은 경우 이 값을 따름)
  interval = "60s"

  # 수집 주기를 interval 범위 내에서 무작위로 분산
  # 여러 장비를 동시에 폴링할 때 부하 집중 방지
  round_interval = true

  # 한 번에 InfluxDB 로 전송할 메트릭 최대 개수
  metric_batch_size = 1000

  # 전송 대기 중 메트릭을 보관할 최대 개수 (초과 시 가장 오래된 메트릭 삭제)
  metric_buffer_limit = 10000

  # 수집 주기와 전송 주기 사이의 대기 시간
  # 수집 완료 후 InfluxDB 전송까지의 지연 허용 범위
  collection_jitter = "0s"

  # InfluxDB 전송 주기 (0s = interval 과 동일)
  flush_interval = "10s"

  # 전송 주기에 무작위 지터 추가 (InfluxDB 부하 분산)
  flush_jitter = "0s"

  # 수집 타임아웃 — 이 시간 내에 수집이 완료되지 않으면 해당 주기 스킵
  precision = ""

  # Telegraf 자체 로그 레벨 (debug / info / warn / error)
  # 운영 환경에서는 "warn" 권장, 디버깅 시 "debug" 로 변경
  quiet = false

  # Telegraf 호스트명 (메트릭의 host 태그로 사용)
  # 기본값은 시스템 호스트명, 명시적으로 지정하여 혼선 방지
  hostname = "telegraf"

  # 호스트명 태그 오버라이드 여부
  omit_hostname = false


# -----------------------------------------------------------------------------
# [[outputs.influxdb_v2]]
#
# 수집된 메트릭을 InfluxDB v2 로 전송하는 출력 플러그인
#
# 환경변수:
#   INFLUXDB_URL    : http://influxdb:8086 (docker-compose 내부 서비스명)
#   INFLUXDB_TOKEN  : InfluxDB API 토큰 (.env 에서 주입)
#   INFLUXDB_ORG    : 조직명 (.env 에서 주입)
#   INFLUXDB_BUCKET : 버킷명 (.env 에서 주입)
# -----------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  # InfluxDB v2 API 엔드포인트
  # docker-compose 내부 네트워크에서 서비스명(influxdb)으로 접근
  urls = ["$INFLUXDB_URL"]

  # InfluxDB API 인증 토큰
  token = "$INFLUXDB_TOKEN"

  # 데이터를 저장할 조직명
  organization = "$INFLUXDB_ORG"

  # 데이터를 저장할 버킷명
  bucket = "$INFLUXDB_BUCKET"

  # InfluxDB 연결 타임아웃
  timeout = "5s"

  # TLS 설정 — InfluxDB 가 HTTP 이므로 비활성화
  # HTTPS 전환 시 아래 주석 해제 후 인증서 경로 설정
  # tls_ca   = "/etc/telegraf/ca.pem"
  # tls_cert = "/etc/telegraf/cert.pem"
  # tls_key  = "/etc/telegraf/key.pem"
  insecure_skip_verify = false