# =============================================================================
# network-monitoring-telegraf / telegraf/inputs.d/snmp_cisco_ios.conf
#
# 목적: Cisco IOS 장비 SNMP 메트릭 수집 설정
#
# 수집 방식:
#   Telegraf SNMP 플러그인 → SNMPv2c / SNMPv3 → Cisco IOS 장비
#
# 수집 항목:
#   IF-MIB:
#   - ifHCInOctets  : 인터페이스 수신 바이트 수 (64bit 카운터)
#   - ifHCOutOctets : 인터페이스 송신 바이트 수 (64bit 카운터)
#   - ifOperStatus  : 인터페이스 운영 상태 (1=up, 2=down)
#   - ifInErrors    : 수신 에러 카운터
#   - ifOutErrors   : 송신 에러 카운터
#   - ifInDiscards  : 수신 드롭 카운터
#   - ifOutDiscards : 송신 드롭 카운터
#   - ifAlias       : 인터페이스 설명 (description)
#
# 버전별 SNMP 설정:
#   v0.4.0 — SNMPv2c (EVE-NG vIOS 테스트 전용, 이 파일 하단 블록)
#   v0.4.1 — SNMPv3 AuthPriv / SHA / AES (이 파일 상단 블록)
#
# 환경변수:
#   SNMP_AUTH_USERNAME : SNMPv3 사용자명          (v0.4.1 이후 사용)
#   SNMP_AUTH_PASSWORD : SHA 인증 비밀번호         (v0.4.1 이후 사용)
#   SNMP_PRIV_PASSWORD : AES 암호화 비밀번호       (v0.4.1 이후 사용)
#   SNMP_COMMUNITY     : SNMPv2c Community String (v0.4.0 EVE-NG 테스트 전용)
#   (docker-compose.yml 의 telegraf 서비스 environment 블록에서 주입)
#
# 장비 추가 방법:
#   해당 블록의 agents 목록에 IP 주소를 추가하고 docker compose restart telegraf 실행
# =============================================================================


# =============================================================================
# [SNMPv3] Cisco IOS — 인터페이스 메트릭 수집
#
# 대상: 실 운영망 IOS 장비 (v0.4.1 이후 EVE-NG 검증 완료 시 활성화)
# 현재: agents 목록이 placeholder 상태 — 실제 장비 IP 입력 전까지 수집 없음
# =============================================================================
[[inputs.snmp]]
  # -------------------------------------------------------------------------
  # 수집 대상 장비 목록
  #
  # 형식: "udp://IP:PORT"
  # 포트 기본값: 161 (SNMP 표준 포트)
  # 장비 추가 시 이 목록에 IP 를 추가하고 Telegraf 재시작
  # -------------------------------------------------------------------------
  agents = [
    "udp://192.168.0.201:161",   # IOS 장비 1 (실제 IP 로 변경)
  ]

  # 수집 주기 — IOS 장비 인터페이스 트래픽 기준으로 60초 설정
  interval = "60s"

  # SNMP 요청 타임아웃 (장비 응답 대기 시간)
  timeout = "10s"

  # 타임아웃 발생 시 재시도 횟수
  retries = 3

  # -------------------------------------------------------------------------
  # SNMPv3 인증 설정
  #
  # version       : 3 (SNMPv3 사용)
  # sec_name      : SNMPv3 사용자명 (장비 설정과 일치해야 함)
  # auth_protocol : SHA (인증 알고리즘)
  # auth_password : SHA 인증 비밀번호 (8자 이상)
  # priv_protocol : AES (암호화 알고리즘)
  #                 ※ Telegraf inputs.snmp 에서 유효한 값은 "AES"
  #                   장비가 aes-128 / aes 128 로 설정되어 있어도 동일하게 적용됨
  #                   "AES128" 은 Telegraf 에서 invalid privProtocol 에러 발생
  # priv_password : AES 암호화 비밀번호 (8자 이상)
  # sec_level     : authPriv (인증 + 암호화 모두 적용)
  # -------------------------------------------------------------------------
  version       = 3
  sec_name      = "$SNMP_AUTH_USERNAME"
  auth_protocol = "SHA"
  auth_password = "$SNMP_AUTH_PASSWORD"
  priv_protocol = "AES"
  priv_password = "$SNMP_PRIV_PASSWORD"
  sec_level     = "authPriv"

  # -------------------------------------------------------------------------
  # 메트릭 이름 접두사
  # InfluxDB 에 저장되는 measurement 이름에 붙는 접두사
  # 예: interface → cisco_ios_interface 로 저장
  # -------------------------------------------------------------------------
  name_prefix = "cisco_ios_"

  # 이 플러그인에서 수집한 메트릭에 추가할 태그
  [inputs.snmp.tags]
    source    = "cisco_ios"   # 수집 대상 시스템 구분
    collector = "snmp"        # 수집 방식 구분
    snmp_ver  = "v3"          # v0.4.1 추가: SNMPv2c 블록과 InfluxDB 에서 구분하기 위한 태그


  # =========================================================================
  # 스칼라 OID (테이블이 아닌 단일 값 수집)
  # =========================================================================

  # -------------------------------------------------------------------------
  # sysName — 장비 호스트명
  #
  # OID  : 1.3.6.1.2.1.1.5.0
  # 용도 : Grafana 대시보드에서 장비명 표시 태그로 활용
  # -------------------------------------------------------------------------
  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    # is_tag=true 로 설정하면 메트릭의 태그로 저장 (필드값이 아닌 인덱스 역할)
    is_tag = true


  # =========================================================================
  # IF-MIB 테이블 (인터페이스별 메트릭)
  #
  # SNMP 테이블: ifXTable (IF-MIB)
  # 인터페이스 인덱스(ifIndex)를 기준으로 각 인터페이스별 데이터 수집
  # =========================================================================

  # -------------------------------------------------------------------------
  # ifXTable — 인터페이스 확장 테이블
  #
  # 64bit 카운터(HC) 사용으로 고속 인터페이스에서 카운터 롤오버 방지
  # 1Gbps 이상 인터페이스에서는 반드시 ifHC* (64bit) 사용 권장
  # -------------------------------------------------------------------------
  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]   # 상위에서 수집한 hostname 태그 상속
    index_as_tag = true           # ifIndex 를 태그로 저장

    # 인터페이스명 — 태그로 저장 (예: GigabitEthernet0/0)
    [[inputs.snmp.table.field]]
      name   = "ifName"
      oid    = "IF-MIB::ifName"
      is_tag = true

    # 인터페이스 설명 (description) — 태그로 저장
    [[inputs.snmp.table.field]]
      name   = "ifAlias"
      oid    = "IF-MIB::ifAlias"
      is_tag = true

    # 인터페이스 운영 상태 (1=up, 2=down, 3=testing)
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid  = "IF-MIB::ifOperStatus"

    # 수신 바이트 수 (64bit 카운터)
    # BPS 계산: (현재값 - 이전값) / 수집주기(초) * 8
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "IF-MIB::ifHCInOctets"

    # 송신 바이트 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "IF-MIB::ifHCOutOctets"

    # 수신 유니캐스트 패킷 수 (64bit 카운터)
    # PPS 계산에 활용
    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "IF-MIB::ifHCInUcastPkts"

    # 송신 유니캐스트 패킷 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "IF-MIB::ifHCOutUcastPkts"

    # 수신 에러 카운터 — 증가 추세 시 물리 계층 문제 의심
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid  = "IF-MIB::ifInErrors"

    # 송신 에러 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid  = "IF-MIB::ifOutErrors"

    # 수신 드롭 카운터 — 버퍼 부족 등으로 폐기된 패킷 수
    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid  = "IF-MIB::ifInDiscards"

    # 송신 드롭 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid  = "IF-MIB::ifOutDiscards"


# =============================================================================
# [SNMPv2c] Cisco IOS — 인터페이스 메트릭 수집 (EVE-NG vIOS 테스트 전용)
#
# 목적  : v0.4.0 EVE-NG vIOS 연동 동작 확인
# 대상  : EVE-NG vIOS 장비 (192.168.0.201)
# 비고  : v0.4.1 에서 상단 SNMPv3 블록과 병렬 수집, snmp_ver 태그로 구분
#
# 장비 측 설정 (vIOS):
#   R1(config)# snmp-server community public RO
# =============================================================================
[[inputs.snmp]]
  # -------------------------------------------------------------------------
  # 수집 대상 — EVE-NG vIOS 장비
  # -------------------------------------------------------------------------
  agents = [
    "udp://192.168.0.201:161",   # EVE-NG vIOS 장비 1
  ]

  interval = "60s"
  timeout  = "10s"
  retries  = 3

  # -------------------------------------------------------------------------
  # SNMPv2c 인증 설정
  #
  # version   : 2 (SNMPv2c 사용)
  # community : Community String (.env 의 SNMP_COMMUNITY 값과 장비 설정 일치 필요)
  # -------------------------------------------------------------------------
  version   = 2
  community = "$SNMP_COMMUNITY"

  name_prefix = "cisco_ios_"

  # snmp_ver 태그: SNMPv3 블록과 데이터를 InfluxDB 에서 구분하기 위한 용도
  [inputs.snmp.tags]
    source    = "cisco_ios"
    collector = "snmp"
    snmp_ver  = "v2c"


  # =========================================================================
  # 스칼라 OID
  # =========================================================================

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true


  # =========================================================================
  # IF-MIB 테이블 (인터페이스별 메트릭)
  # =========================================================================

  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name   = "ifName"
      oid    = "IF-MIB::ifName"
      is_tag = true

    [[inputs.snmp.table.field]]
      name   = "ifAlias"
      oid    = "IF-MIB::ifAlias"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid  = "IF-MIB::ifOperStatus"

    # 수신 바이트 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "IF-MIB::ifHCInOctets"

    # 송신 바이트 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "IF-MIB::ifHCOutOctets"

    # 수신 유니캐스트 패킷 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "IF-MIB::ifHCInUcastPkts"

    # 송신 유니캐스트 패킷 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "IF-MIB::ifHCOutUcastPkts"

    # 수신 에러 카운터
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid  = "IF-MIB::ifInErrors"

    # 송신 에러 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid  = "IF-MIB::ifOutErrors"

    # 수신 드롭 카운터
    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid  = "IF-MIB::ifInDiscards"

    # 송신 드롭 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid  = "IF-MIB::ifOutDiscards"