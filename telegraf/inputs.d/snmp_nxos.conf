# =============================================================================
# network-monitoring-telegraf / telegraf/inputs.d/snmp_nxos.conf
#
# 목적: Cisco NX-OS 장비 SNMP 메트릭 수집 설정
#
# 수집 방식:
#   Telegraf SNMP 플러그인 → SNMPv2c / SNMPv3 → Cisco NX-OS 장비
#
# 수집 항목:
#   IF-MIB (IOS 와 동일):
#   - ifHCInOctets   : 인터페이스 수신 바이트 수 (64bit 카운터)
#   - ifHCOutOctets  : 인터페이스 송신 바이트 수 (64bit 카운터)
#   - ifOperStatus   : 인터페이스 운영 상태 (1=up, 2=down)
#   - ifInErrors     : 수신 에러 카운터
#   - ifOutErrors    : 송신 에러 카운터
#   - ifInDiscards   : 수신 드롭 카운터
#   - ifOutDiscards  : 송신 드롭 카운터
#
#   CISCO-PROCESS-MIB (NX-OS 추가 수집):
#   - cpmCPUTotal5minRev : CPU 사용률 (5분 평균, %)
#   - cpmCPUTotal1minRev : CPU 사용률 (1분 평균, %)
#
#   CISCO-MEMORY-POOL-MIB (NX-OS 추가 수집):
#   - ciscoMemoryPoolUsed        : 메모리 사용량 (bytes)
#   - ciscoMemoryPoolFree        : 메모리 여유량 (bytes)
#   - ciscoMemoryPoolLargestFree : 최대 연속 여유 메모리 (bytes, 단편화 분석용)
#
# 버전별 SNMP 설정:
#   v0.4.0 — SNMPv2c (EVE-NG vNX-OS 테스트 전용, 이 파일 하단 블록 3개)
#   v0.4.1 — SNMPv3 AuthPriv / SHA / AES (이 파일 상단 블록 3개)
#
# 환경변수:
#   SNMP_AUTH_USERNAME : SNMPv3 사용자명          (v0.4.1 이후 사용)
#   SNMP_AUTH_PASSWORD : SHA 인증 비밀번호         (v0.4.1 이후 사용)
#   SNMP_PRIV_PASSWORD : AES 암호화 비밀번호       (v0.4.1 이후 사용)
#   SNMP_COMMUNITY     : SNMPv2c Community String (v0.4.0 EVE-NG 테스트 전용)
#   (docker-compose.yml 의 telegraf 서비스 environment 블록에서 주입)
#
# IOS 와의 차이점:
#   - name_prefix : "cisco_nxos_" (IOS 와 구분)
#   - CPU/메모리 수집 블록 추가 (CISCO-PROCESS-MIB, CISCO-MEMORY-POOL-MIB)
#   - source 태그 : "cisco_nxos"
#
# 장비 추가 방법:
#   해당 블록의 agents 목록에 IP 주소를 추가하고 docker compose restart telegraf 실행
# =============================================================================


# =============================================================================
# [SNMPv3] NX-OS — 인터페이스 메트릭 수집 (IF-MIB)
#
# 대상: 실 운영망 NX-OS 장비 (v0.4.1 이후 EVE-NG 검증 완료 시 활성화)
# =============================================================================
[[inputs.snmp]]
  # -------------------------------------------------------------------------
  # 수집 대상 장비 목록
  # -------------------------------------------------------------------------
  agents = [
    "udp://192.168.0.202:161",   # NX-OS 장비 1 (실제 IP 로 변경)
  ]

  interval = "60s"
  timeout  = "10s"
  retries  = 3

  # -------------------------------------------------------------------------
  # SNMPv3 인증 설정 (IOS 와 동일한 크리덴셜 사용)
  #
  # priv_protocol : AES
  #   ※ Telegraf inputs.snmp 에서 유효한 값은 "AES"
  #     장비가 aes-128 / aes 128 로 설정되어 있어도 동일하게 적용됨
  #     "AES128" 은 Telegraf 에서 invalid privProtocol 에러 발생
  # -------------------------------------------------------------------------
  version       = 3
  sec_name      = "$SNMP_AUTH_USERNAME"
  auth_protocol = "SHA"
  auth_password = "$SNMP_AUTH_PASSWORD"
  priv_protocol = "AES"
  priv_password = "$SNMP_PRIV_PASSWORD"
  sec_level     = "authPriv"

  # NX-OS 전용 접두사 — InfluxDB 에서 IOS 메트릭과 구분
  name_prefix = "cisco_nxos_"

  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v3"          # v0.4.1 추가: SNMPv2c 블록과 InfluxDB 에서 구분하기 위한 태그


  # =========================================================================
  # 스칼라 OID
  # =========================================================================

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true


  # =========================================================================
  # IF-MIB 테이블 (인터페이스별 메트릭)
  #
  # IOS 와 동일한 OID 구조 사용
  # NX-OS 의 ifXTable 은 IF-MIB 표준을 준수하므로 동일하게 수집 가능
  # =========================================================================
  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    index_as_tag = true

    # 인터페이스명 — 태그로 저장 (예: Ethernet1/1)
    [[inputs.snmp.table.field]]
      name   = "ifName"
      oid    = "IF-MIB::ifName"
      is_tag = true

    # 인터페이스 설명 (description) — 태그로 저장
    [[inputs.snmp.table.field]]
      name   = "ifAlias"
      oid    = "IF-MIB::ifAlias"
      is_tag = true

    # 인터페이스 운영 상태 (1=up, 2=down, 3=testing)
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid  = "IF-MIB::ifOperStatus"

    # 수신 바이트 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "IF-MIB::ifHCInOctets"

    # 송신 바이트 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "IF-MIB::ifHCOutOctets"

    # 수신 유니캐스트 패킷 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "IF-MIB::ifHCInUcastPkts"

    # 송신 유니캐스트 패킷 수 (64bit 카운터)
    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "IF-MIB::ifHCOutUcastPkts"

    # 수신 에러 카운터
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid  = "IF-MIB::ifInErrors"

    # 송신 에러 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid  = "IF-MIB::ifOutErrors"

    # 수신 드롭 카운터
    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid  = "IF-MIB::ifInDiscards"

    # 송신 드롭 카운터
    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid  = "IF-MIB::ifOutDiscards"


# =============================================================================
# [SNMPv3] NX-OS — CPU 메트릭 수집 (CISCO-PROCESS-MIB)
#
# 대상: 실 운영망 NX-OS 장비 (v0.4.1 이후 활성화)
#
# CISCO-PROCESS-MIB::cpmCPUTotalTable:
#   - cpmCPUTotal5minRev : 5분 평균 CPU 사용률 (%)
#   - cpmCPUTotal1minRev : 1분 평균 CPU 사용률 (%) — 단기 스파이크 감지용
#
# NX-OS 는 멀티코어 구조이므로 인덱스별로 CPU 코어가 구분됨
# 인덱스 1 이 전체 평균값인 경우가 많으나 장비 모델에 따라 다를 수 있음
# =============================================================================
[[inputs.snmp]]
  agents = [
    "udp://192.168.0.202:161",   # EVE-NG vNX-OS 실제 IP
  ]

  interval      = "60s"
  timeout       = "10s"
  retries       = 3
  version       = 3
  sec_name      = "$SNMP_AUTH_USERNAME"
  auth_protocol = "SHA"
  auth_password = "$SNMP_AUTH_PASSWORD"
  priv_protocol = "AES"   # Telegraf 유효 값은 "AES" ("AES128" 은 invalid privProtocol 에러)
  priv_password = "$SNMP_PRIV_PASSWORD"
  sec_level     = "authPriv"

  name_prefix = "cisco_nxos_"

  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v3"          # v0.4.1 추가

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true

  # -------------------------------------------------------------------------
  # CPU 사용률 테이블 (CISCO-PROCESS-MIB)
  # -------------------------------------------------------------------------
  [[inputs.snmp.table]]
    name         = "cpu"
    inherit_tags = ["hostname"]
    index_as_tag = true

    # CPU 인덱스 — 태그로 저장 (멀티코어 구분용)
    [[inputs.snmp.table.field]]
      name   = "cpmCPUTotalPhysicalIndex"
      oid    = "CISCO-PROCESS-MIB::cpmCPUTotalPhysicalIndex"
      is_tag = true

    # 5분 평균 CPU 사용률 (%)
    # cpmCPUTotal5minRev: Revised 버전 (NX-OS 7.x 이상 권장 OID)
    [[inputs.snmp.table.field]]
      name = "cpmCPUTotal5minRev"
      oid  = "CISCO-PROCESS-MIB::cpmCPUTotal5minRev"

    # 1분 평균 CPU 사용률 (%) — 단기 스파이크 감지용
    [[inputs.snmp.table.field]]
      name = "cpmCPUTotal1minRev"
      oid  = "CISCO-PROCESS-MIB::cpmCPUTotal1minRev"


# =============================================================================
# [SNMPv3] NX-OS — 메모리 메트릭 수집 (CISCO-MEMORY-POOL-MIB)
#
# 대상: 실 운영망 NX-OS 장비 (v0.4.1 이후 활성화)
#
# CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolTable:
#   - ciscoMemoryPoolUsed        : 사용 중인 메모리 (bytes)
#   - ciscoMemoryPoolFree        : 여유 메모리 (bytes)
#   - ciscoMemoryPoolLargestFree : 최대 연속 여유 메모리 (bytes, 단편화 분석용)
#   - ciscoMemoryPoolName        : 메모리 풀 이름 (예: Processor, I/O)
#
# 메모리 사용률 계산 (Grafana Flux 쿼리):
#   used / (used + free) * 100
# =============================================================================
[[inputs.snmp]]
  agents = [
    "udp://192.168.0.202:161",   # EVE-NG vNX-OS 실제 IP
  ]

  interval      = "60s"
  timeout       = "10s"
  retries       = 3
  version       = 3
  sec_name      = "$SNMP_AUTH_USERNAME"
  auth_protocol = "SHA"
  auth_password = "$SNMP_AUTH_PASSWORD"
  priv_protocol = "AES"   # Telegraf 유효 값은 "AES" ("AES128" 은 invalid privProtocol 에러)
  priv_password = "$SNMP_PRIV_PASSWORD"
  sec_level     = "authPriv"

  name_prefix = "cisco_nxos_"

  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v3"          # v0.4.1 추가

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true

  # -------------------------------------------------------------------------
  # 메모리 풀 테이블 (CISCO-MEMORY-POOL-MIB)
  # -------------------------------------------------------------------------
  [[inputs.snmp.table]]
    name         = "memory"
    inherit_tags = ["hostname"]
    index_as_tag = true

    # 메모리 풀 이름 — 태그로 저장 (예: Processor, I/O)
    [[inputs.snmp.table.field]]
      name   = "ciscoMemoryPoolName"
      oid    = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolName"
      is_tag = true

    # 사용 중인 메모리 (bytes)
    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolUsed"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolUsed"

    # 여유 메모리 (bytes)
    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolFree"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolFree"

    # 최대 연속 여유 메모리 (bytes) — 메모리 단편화 분석에 활용
    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolLargestFree"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolLargestFree"


# =============================================================================
# [SNMPv2c] NX-OS — 인터페이스 메트릭 수집 (EVE-NG vNX-OS 테스트 전용)
#
# 목적  : v0.4.0 EVE-NG vNX-OS 연동 동작 확인
# 대상  : EVE-NG vNX-OS 장비 (192.168.0.202)
# 비고  : v0.4.1 에서 상단 SNMPv3 블록과 병렬 수집, snmp_ver 태그로 구분
#
# 장비 측 설정 (vNX-OS):
#   NX-LAB(config)# snmp-server community public group network-operator
# =============================================================================
[[inputs.snmp]]
  # -------------------------------------------------------------------------
  # 수집 대상 — EVE-NG vNX-OS 장비
  # -------------------------------------------------------------------------
  agents = [
    "udp://192.168.0.202:161",   # EVE-NG vNX-OS 장비 1
  ]

  interval = "60s"
  timeout  = "10s"
  retries  = 3

  # -------------------------------------------------------------------------
  # SNMPv2c 인증 설정
  # -------------------------------------------------------------------------
  version   = 2
  community = "$SNMP_COMMUNITY"

  name_prefix = "cisco_nxos_"

  # snmp_ver 태그: SNMPv3 블록과 데이터를 InfluxDB 에서 구분하기 위한 용도
  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v2c"


  # =========================================================================
  # 스칼라 OID
  # =========================================================================

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true


  # =========================================================================
  # IF-MIB 테이블 (인터페이스별 메트릭)
  # =========================================================================

  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name   = "ifName"
      oid    = "IF-MIB::ifName"
      is_tag = true

    [[inputs.snmp.table.field]]
      name   = "ifAlias"
      oid    = "IF-MIB::ifAlias"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid  = "IF-MIB::ifOperStatus"

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "IF-MIB::ifHCInOctets"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "IF-MIB::ifHCOutOctets"

    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "IF-MIB::ifHCInUcastPkts"

    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "IF-MIB::ifHCOutUcastPkts"

    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid  = "IF-MIB::ifInErrors"

    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid  = "IF-MIB::ifOutErrors"

    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid  = "IF-MIB::ifInDiscards"

    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid  = "IF-MIB::ifOutDiscards"


# =============================================================================
# [SNMPv2c] NX-OS — CPU 메트릭 수집 (EVE-NG vNX-OS 테스트 전용)
#
# 목적  : v0.4.0 EVE-NG vNX-OS CPU 수집 동작 확인
# 비고  : v0.4.1 에서 상단 SNMPv3 블록과 병렬 수집, snmp_ver 태그로 구분
# =============================================================================
[[inputs.snmp]]
  agents = [
    "udp://192.168.0.202:161",   # EVE-NG vNX-OS 장비 1 (IF-MIB 블록과 동일 IP)
  ]

  interval  = "60s"
  timeout   = "10s"
  retries   = 3
  version   = 2
  community = "$SNMP_COMMUNITY"

  name_prefix = "cisco_nxos_"

  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v2c"

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true

  # -------------------------------------------------------------------------
  # CPU 사용률 테이블 (CISCO-PROCESS-MIB)
  # -------------------------------------------------------------------------
  [[inputs.snmp.table]]
    name         = "cpu"
    inherit_tags = ["hostname"]
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name   = "cpmCPUTotalPhysicalIndex"
      oid    = "CISCO-PROCESS-MIB::cpmCPUTotalPhysicalIndex"
      is_tag = true

    # 5분 평균 CPU 사용률 (%)
    [[inputs.snmp.table.field]]
      name = "cpmCPUTotal5minRev"
      oid  = "CISCO-PROCESS-MIB::cpmCPUTotal5minRev"

    # 1분 평균 CPU 사용률 (%)
    [[inputs.snmp.table.field]]
      name = "cpmCPUTotal1minRev"
      oid  = "CISCO-PROCESS-MIB::cpmCPUTotal1minRev"


# =============================================================================
# [SNMPv2c] NX-OS — 메모리 메트릭 수집 (EVE-NG vNX-OS 테스트 전용)
#
# 목적  : v0.4.0 EVE-NG vNX-OS 메모리 수집 동작 확인
# 비고  : v0.4.1 에서 상단 SNMPv3 블록과 병렬 수집, snmp_ver 태그로 구분
# =============================================================================
[[inputs.snmp]]
  agents = [
    "udp://192.168.0.202:161",   # EVE-NG vNX-OS 장비 1 (IF-MIB 블록과 동일 IP)
  ]

  interval  = "60s"
  timeout   = "10s"
  retries   = 3
  version   = 2
  community = "$SNMP_COMMUNITY"

  name_prefix = "cisco_nxos_"

  [inputs.snmp.tags]
    source    = "cisco_nxos"
    collector = "snmp"
    snmp_ver  = "v2c"

  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true

  # -------------------------------------------------------------------------
  # 메모리 풀 테이블 (CISCO-MEMORY-POOL-MIB)
  # -------------------------------------------------------------------------
  [[inputs.snmp.table]]
    name         = "memory"
    inherit_tags = ["hostname"]
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name   = "ciscoMemoryPoolName"
      oid    = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolName"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolUsed"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolUsed"

    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolFree"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolFree"

    [[inputs.snmp.table.field]]
      name = "ciscoMemoryPoolLargestFree"
      oid  = "CISCO-MEMORY-POOL-MIB::ciscoMemoryPoolLargestFree"