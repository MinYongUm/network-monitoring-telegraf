# =============================================================================
# network-monitoring-telegraf / telegraf/inputs.d/eve_ng.conf
#
# 목적: EVE-NG 홈 서버(192.168.0.200) 시스템 메트릭 수집 설정
#
# 수집 방식:
#   Telegraf prometheus 플러그인 → HTTP GET → Node Exporter (TCP 9100)
#   Node Exporter 가 Prometheus 형식으로 메트릭 노출
#   → Telegraf 가 파싱하여 InfluxDB 로 전송
#
# 수집 항목:
#   - CPU 사용률      : node_cpu_seconds_total (모드별: user/system/idle 등)
#   - 메모리 사용량   : node_memory_MemTotal/MemFree/MemAvailable/Buffers/Cached
#   - 디스크 사용량   : node_filesystem_size/avail/used (마운트 포인트별)
#   - 디스크 I/O      : node_disk_read/written_bytes_total (디바이스별)
#   - 네트워크 I/O    : node_network_receive/transmit_bytes_total (인터페이스별)
#   - 시스템 업타임   : node_boot_time_seconds
#   - 부하 평균       : node_load1 / node_load5 / node_load15
#
# 사전 요구사항:
#   EVE-NG 홈 서버에서 Node Exporter 실행 중이어야 함
#   실행 방법은 INSTALL.md 의 "홈 서버 연동" 섹션 참고
#
# 수집 주기:
#   다른 수집 대상(60s)보다 긴 120s 로 설정
#   이유: 홈 서버는 네트워크 장비 대비 변화가 느리고
#         Node Exporter 데이터는 메트릭 양이 많아 부하 분산 필요
# =============================================================================


# -----------------------------------------------------------------------------
# [[inputs.prometheus]]
#
# Prometheus 형식(exposition format)으로 노출된 메트릭을 수집하는 플러그인
# Node Exporter 의 /metrics 엔드포인트를 주기적으로 스크래핑
# -----------------------------------------------------------------------------
[[inputs.prometheus]]
  # -------------------------------------------------------------------------
  # 수집 대상 URL 목록
  #
  # Node Exporter 기본 포트: 9100
  # 홈 서버 IP: 192.168.0.200 (Proxmox EVE-NG 서버)
  # -------------------------------------------------------------------------
  urls = ["http://192.168.0.200:9100/metrics"]

  # 수집 주기 — 홈 서버 특성상 120초로 설정 (네트워크 장비보다 변화 느림)
  interval = "120s"

  # HTTP 요청 타임아웃
  # Node Exporter 는 로컬 시스템 메트릭 수집이므로 10초면 충분
  timeout = "10s"

  # -------------------------------------------------------------------------
  # 메트릭 이름 접두사
  #
  # inputs.prometheus 플러그인은 모든 메트릭을 "prometheus" 라는
  # 단일 measurement 이름으로 수집한다.
  # name_prefix 를 적용하면 measurement 이름이 아래와 같이 변경된다:
  #   prometheus → eve_ng_prometheus
  #
  # 주의: namepass 는 name_prefix 적용 전 원본 이름("prometheus") 기준으로
  #       평가된다. 따라서 namepass 에는 "prometheus" 를 지정해야 한다.
  # -------------------------------------------------------------------------
  name_prefix = "eve_ng_"

  # -------------------------------------------------------------------------
  # Prometheus 태그 처리 방식
  #
  # metric_version = 2: Prometheus 레이블을 InfluxDB 태그로 변환하는
  # 권장 방식 (v1 대비 카디널리티 처리 개선)
  # -------------------------------------------------------------------------
  metric_version = 2

  # -------------------------------------------------------------------------
  # 수집할 measurement 이름 필터
  #
  # inputs.prometheus 플러그인의 기본 measurement 이름은 "prometheus"
  # namepass 는 name_prefix 적용 전 기준으로 평가되므로 "prometheus" 지정
  # → InfluxDB 저장 시 measurement 이름: eve_ng_prometheus
  # -------------------------------------------------------------------------
  namepass = ["prometheus"]

  # -------------------------------------------------------------------------
  # 불필요한 태그 제거
  #
  # scrape_job 태그는 Kubernetes 환경에서 사용되는 태그로
  # 이 환경에서는 불필요하므로 제거하여 카디널리티 감소
  # -------------------------------------------------------------------------
  tagexclude = ["scrape_job"]

  # -------------------------------------------------------------------------
  # 이 플러그인에서 수집한 메트릭에 추가할 태그
  # -------------------------------------------------------------------------
  [inputs.prometheus.tags]
    source    = "eve_ng"          # 수집 대상 시스템 구분
    collector = "node_exporter"   # 수집 방식 구분
    hostname  = "eve-ng-server"   # 홈 서버 식별용 고정 태그

  # -------------------------------------------------------------------------
  # HTTP 헤더 설정 (필요 시 인증 헤더 추가)
  #
  # Node Exporter 기본 설정은 인증 없이 접근 가능
  # 보안 강화 시 Basic Auth 또는 Bearer Token 설정 권장
  # -------------------------------------------------------------------------
  # [inputs.prometheus.headers]
  #   Authorization = "Bearer your_token_here"