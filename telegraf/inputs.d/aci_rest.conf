# =============================================================================
# network-monitoring-telegraf / telegraf/inputs.d/aci_rest.conf
#
# 목적: Cisco ACI APIC REST API 메트릭 수집 설정
#
# 수집 방식:
#   Telegraf exec 플러그인 → aci_collector.py 주기 호출
#   → stdout 으로 InfluxDB line protocol 출력
#   → Telegraf 가 파싱하여 InfluxDB 로 전송
#
# 수집 항목:
#   - faultInst        : Fault 목록 (severity 별: critical/major/minor/warning)
#   - fabricHealthTotal: Fabric 전체 Health Score
#   - fabricNode       : ACI Node(APIC/Leaf/Spine) 상태
#
# 환경변수:
#   APIC_URL      : ACI APIC URL (https://your-apic-ip)
#   APIC_USERNAME : Read-only 계정명
#   APIC_PASSWORD : 계정 비밀번호
#   (docker-compose.yml 의 telegraf 서비스 environment 블록에서 주입)
#
# 관련 파일:
#   scripts/aci_collector.py  : 실제 수집 로직
#   scripts/requirements.txt  : Python 패키지 의존성
# =============================================================================


# -----------------------------------------------------------------------------
# [[inputs.exec]]
#
# 외부 명령어/스크립트를 주기적으로 실행하고
# stdout 출력을 메트릭으로 수집하는 플러그인
#
# aci_collector.py 는 InfluxDB line protocol 형식으로 stdout 출력
# 출력 예시:
#   aci_fault,severity=critical,dn=topology/... count=3i 1700000000000000000
#   aci_health,node=topology/pod-1/node-101 score=98i 1700000000000000000
#   aci_node,node_id=101,role=leaf,pod_id=1 state=1i 1700000000000000000
# -----------------------------------------------------------------------------
[[inputs.exec]]
  # 실행할 명령어 목록
  # aci-collector 컨테이너 내부의 /scripts/aci_collector.py 를 실행
  # docker-compose.yml 에서 ./scripts 를 /scripts 로 마운트
  commands = ["/usr/local/bin/python3 /scripts/aci_collector.py"]

  # 수집 주기 — ACI APIC 부하를 고려하여 60초로 설정
  # telegraf.conf 의 기본 interval(60s) 과 동일하지만 명시적으로 지정
  interval = "60s"

  # 스크립트 실행 타임아웃
  # APIC 응답 지연을 고려하여 30초로 설정 (기본값 5s 보다 넉넉하게)
  timeout = "30s"

  # stdout 출력 형식 — aci_collector.py 가 line protocol 로 출력
  data_format = "influx"

  # 이 플러그인에서 수집한 메트릭에 추가할 태그
  [inputs.exec.tags]
    # 수집 대상 시스템 구분 태그
    source = "aci"
    # 수집 방식 태그 (telegraf.conf global_tags 의 project 태그와 조합하여
    # Grafana 에서 TIG/Zabbix 비교 필터링에 활용)
    collector = "exec"